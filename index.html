<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Sponsor for 12 steps programs</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; }
        #chat-box { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>IA Sponsor for 12 steps programs</h1>
    
    <div id="chat-box">
        <p><em>Bonjour Carl. Comment se passe ton programme aujourd'hui ?</em></p>
    </div>

    <div class="input-group">
        <input type="text" id="user-input" placeholder="Parle-moi de ta journée..." autocomplete="off">
        <button id="send-btn">Envoyer</button>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Afficher le message utilisateur
            chatBox.innerHTML += `<p><strong>Toi:</strong> ${text}</p>`;
            input.value = ''; // Vide le champ immédiatement
            chatBox.scrollTop = chatBox.scrollHeight;

            // Envoi au serveur
            const formData = new FormData();
            formData.append('message', text);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                chatBox.innerHTML += `<p><strong>IA Sponsor:</strong> ${data.reply}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        // Action au clic sur le bouton
        btn.addEventListener('click', sendMessage);

        // --- CORRECTION : Action sur la touche ENTER ---
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // Empêche tout comportement par défaut
                sendMessage();
            }
        });
    </script>
</body>
</html>
