<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sponsor</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; background: #f4f4f9; }
        #chatbox { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; background: white; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin: 10px 0; padding: 8px; border-radius: 5px; }
        .user { background: #e3f2fd; text-align: right; }
        .ai { background: #f1f8e9; text-align: left; }
        .controls { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #2196f3; color: white; }
        button:disabled { background: #ccc; }
        #recordBtn.recording { background: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h2>Mon Parrain IA</h2>
    <div id="chatbox"></div>
    
    <div class="controls">
        <input type="text" id="textInput" placeholder="Écris un message...">
        <button onclick="sendText()">Envoyer</button>
        <button id="recordBtn" onclick="toggleRecording()">Micro</button>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        const chatbox = document.getElementById('chatbox');
        const recordBtn = document.getElementById('recordBtn');
        
        // Détecte automatiquement l'URL de ton serveur Render ou localhost
        const API_URL = window.location.origin;

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        async function sendText() {
            const input = document.getElementById('textInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMsg(msg, 'user');
            input.value = '';

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                addMsg(data.response, 'ai');
            } catch (e) {
                addMsg("Le serveur ne répond pas. Réessaie plus tard.", 'ai');
            }
        }

        async function toggleRecording() {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = sendVoice;

                mediaRecorder.start();
                recordBtn.innerText = "Arrêter";
                recordBtn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                recordBtn.innerText = "Micro";
                recordBtn.classList.remove('recording');
            }
        }

        async function sendVoice() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('file', audioBlob);

            addMsg("(Message vocal envoyé)", 'user');

            try {
                const res = await fetch(`${API_URL}/voice-chat`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                addMsg(data.response, 'ai');
                if (data.audio_url) {
                    const audio = new Audio(`${API_URL}${data.audio_url}`);
                    audio.play();
                }
            } catch (e) {
                addMsg("Erreur lors de l'envoi du vocal.", 'ai');
            }
        }
    </script>
</body>
</html>
