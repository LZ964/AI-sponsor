<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Sponsor | Connexion Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f1a; color: #e0e0e0; font-family: sans-serif; }
        .neon-border { border: 1px solid #00f2ff; border-radius: 15px; background: #16213e; }
        .ai-msg { background: rgba(0, 102, 255, 0.1); border-left: 3px solid #00f2ff; padding: 1rem; margin: 1rem 0; border-radius: 0 10px 10px 0; }
        .user-msg { background: rgba(255, 255, 255, 0.05); border-right: 3px solid #7000ff; padding: 1rem; margin: 1rem 0; text-align: right; border-radius: 10px 0 0 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <h1 class="text-2xl font-bold text-center text-cyan-400 mb-4 tracking-widest">AI-SPONSOR PRO</h1>
    
    <main class="flex-grow max-w-2xl mx-auto w-full flex flex-col overflow-hidden">
        <div id="chat-window" class="flex-grow overflow-y-auto mb-4 p-4 neon-border">
            <div class="ai-msg">Système initialisé. Bonjour Carl, je suis prêt pour cette journée.</div>
        </div>

        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-grow bg-gray-800 border-none rounded-full px-4 text-white focus:ring-1 focus:ring-cyan-500" placeholder="Message...">
            <button onclick="sendMessage()" class="bg-cyan-600 p-3 rounded-full text-black font-bold hover:bg-cyan-400 transition-colors">🚀</button>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyBPd7ORtzCO2662BFBAntDR2gnYJSW54yQ";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value.trim()) return;

            const text = input.value;
            input.value = '';
            
            // Afficher le message utilisateur
            chatWindow.innerHTML += `<div class="user-msg">${text}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // Utilisation de gemini-1.5-flash sur v1beta (le plus compatible)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Réponds brièvement en tant que parrain de rétablissement empathique à : " + text }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                chatWindow.innerHTML += `<div class="ai-msg">${aiResponse}</div>`;
            } catch (e) {
                console.error(e);
                chatWindow.innerHTML += `<div class="text-red-500 text-center text-xs mt-2 italic">ERREUR : ${e.message}</div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Permettre l'envoi avec la touche Entrée
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
