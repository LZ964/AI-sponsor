            <span class="font-bold text-indigo-600">Mon Parrain <span class="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded ml-2">v6.1</span></span>

<div class="p-4 max-w-2xl mx-auto w-full">
    <div id="key-section" class="bg-white p-3 rounded-xl border border-dashed border-indigo-200 flex gap-2">
        <input type="password" id="key-input" class="flex-1 text-sm p-2 bg-slate-50 rounded-lg outline-none" placeholder="Clé API Gemini...">
        <button id="save-btn" onclick="saveKey()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all">ACTIVER</button>
    </div>
</div>

<div id="chat-box" class="chat-container overflow-y-auto flex flex-col p-4 max-w-2xl mx-auto w-full">
    <div class="message ai shadow-sm">Bonjour Carl. La clé est gérée sans popup pour plus de fluidité.</div>
</div>

<footer class="p-4 bg-white border-t mt-auto">
    <div class="flex gap-2 max-w-2xl mx-auto">
        <input id="user-input" type="text" class="flex-1 p-3 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="On continue ?">
        <button id="send-btn" onclick="handleSend()" class="bg-indigo-600 text-white px-6 py-2 rounded-2xl font-semibold disabled:opacity-50">Envoi</button>
    </div>
</footer>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const keyInput = document.getElementById('key-input');
    const sendBtn = document.getElementById('send-btn');
    const saveBtn = document.getElementById('save-btn');
    const apiStatus = document.getElementById('api-status');

    const MODEL = "gemini-1.5-flash";

    let history = [
        { role: "user", parts: [{ text: "Ton nom est Le Parrain. Tu es un mentor bienveillant pour Carl. Réponds brièvement." }] },
        { role: "model", parts: [{ text: "Bien reçu." }] }
    ];

    const savedKey = localStorage.getItem('gemini_api_key_v61');
    if (savedKey) keyInput.value = savedKey;

    function saveKey() {
        const val = keyInput.value.trim();
        if(!val) return;
        localStorage.setItem('gemini_api_key_v61', val);
        saveBtn.innerText = "ENREGISTRÉ !";
        saveBtn.classList.replace('bg-indigo-600', 'bg-green-600');
        setTimeout(() => { location.reload(); }, 500);
    }

    async function handleSend() {
        const text = userInput.value.trim();
        const key = localStorage.getItem('gemini_api_key_v61');
        if (!text || !key) return;

        appendMsg('user', text);
        userInput.value = '';
        sendBtn.disabled = true;
        apiStatus.innerText = "Transmission...";
        history.push({ role: "user", parts: [{ text: text }] });

        try {
            const url = `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${key}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: history })
            });

            const data = await response.json();
            
            if (response.ok && data.candidates) {
                const reply = data.candidates[0].content.parts[0].text;
                appendMsg('ai', reply);
                history.push({ role: "model", parts: [{ text: reply }] });
                apiStatus.innerText = "Stable";
            } else {
                const errorMsg = data.error ? data.error.message : "Erreur inconnue";
                appendMsg('ai', "Le serveur est occupé ou la clé est invalide.");
                const errDiv = document.createElement('div');
                errDiv.className = "err-msg";
                errDiv.innerText = `Détail : ${errorMsg}`;
                chatBox.lastChild.appendChild(errDiv);
                apiStatus.innerText = "Erreur";
                history.pop();
            }
        } catch (e) {
            appendMsg('ai', "Erreur réseau.");
            apiStatus.innerText = "Échec";
        }
        sendBtn.disabled = false;
    }

    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role} shadow-sm`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
</script>
