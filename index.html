<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Sponsor | Connexion Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f1a; color: #e0e0e0; font-family: sans-serif; }
        .neon-border { border: 1px solid #00f2ff; border-radius: 15px; background: #16213e; }
        .ai-msg { background: rgba(0, 102, 255, 0.1); border-left: 3px solid #00f2ff; padding: 1rem; margin: 1rem 0; }
        .user-msg { background: rgba(255, 255, 255, 0.05); border-right: 3px solid #7000ff; padding: 1rem; margin: 1rem 0; text-align: right; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <h1 class="text-2xl font-bold text-center text-cyan-400 mb-4">AI-SPONSOR PRO</h1>
    
    <main class="flex-grow max-w-2xl mx-auto w-full flex flex-col">
        <div id="chat-window" class="flex-grow overflow-y-auto mb-4 p-4 neon-border">
            <div class="ai-msg">Système prêt, Carl. Comment vas-tu ?</div>
        </div>

        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-grow bg-gray-800 border-none rounded-full px-4 text-white" placeholder="Message...">
            <button onclick="sendMessage()" class="bg-cyan-600 p-3 rounded-full text-black font-bold">🚀</button>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyBPd7ORtzCO2662BFBAntDR2gnYJSW54yQ";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value.trim()) return;

            const text = input.value;
            input.value = '';
            chatWindow.innerHTML += `<div class="user-msg">${text}</div>`;

            try {
                // Utilisation du modèle générique 'gemini-pro' sur l'endpoint v1
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Réponds brièvement en tant que parrain de rétablissement : " + text }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                chatWindow.innerHTML += `<div class="ai-msg">${aiResponse}</div>`;
            } catch (e) {
                chatWindow.innerHTML += `<div class="text-red-500 text-center text-xs">ERREUR : ${e.message}</div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
