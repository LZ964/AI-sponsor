<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Sponsor | Interface Avancée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%); color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .neon-border { position: relative; background: #16213e; border-radius: 15px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .ai-message { background: rgba(0, 102, 255, 0.1); border-left: 3px solid #00f2ff; border-radius: 0 12px 12px 0; }
        .user-message { background: rgba(255, 255, 255, 0.05); border-right: 3px solid #7000ff; border-radius: 12px 0 0 12px; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <header class="p-6 text-center border-b border-gray-800">
        <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
            AI-SPONSOR PRO
        </h1>
    </header>

    <main class="flex-grow container mx-auto max-w-3xl flex flex-col overflow-hidden">
        <div id="chat-window" class="flex-grow overflow-y-auto mb-4 p-4 neon-border space-y-4">
            <div class="ai-message p-4">Système prêt. Bonjour Carl.</div>
        </div>

        <div class="flex gap-2 p-2 bg-black/40 rounded-full border border-gray-700">
            <input type="text" id="user-input" class="flex-grow bg-transparent border-none focus:ring-0 text-white px-4" placeholder="Tapez votre message...">
            <button onclick="sendMessage()" class="bg-cyan-600 text-black font-bold p-3 rounded-full">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyBPd7ORtzCO2662BFBAntDR2gnYJSW54yQ"; 

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value.trim()) return;

            const userText = input.value;
            input.value = '';
            chatWindow.innerHTML += `<div class="user-message p-4 ml-auto text-right font-mono text-sm"><span class="text-purple-400 text-xs block">USER_INPUT</span>${userText}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Tentative avec Gemini 1.5 Flash (le plus récent et gratuit)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Réponds en tant que parrain virtuel de rétablissement (12 étapes) à : " + userText }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : `Erreur ${response.status}`);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                chatWindow.innerHTML += `<div class="ai-message p-4 font-mono text-sm"><span class="text-cyan-400 text-xs block">AI_RESPONSE</span>${aiText}</div>`;
            } catch (error) {
                chatWindow.innerHTML += `<div class="p-2 text-red-500 text-xs text-center font-mono italic">ERREUR : ${error.message}</div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
