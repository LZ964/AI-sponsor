<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AI Sponsor</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app { width: 100%; max-width: 400px; height: 90vh; background: white; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 15px 15px 0 0; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 10px; font-size: 14px; max-width: 80%; word-wrap: break-word; }
        .user { background: #3498db; color: white; align-self: flex-end; }
        .ai { background: #ecf0f1; color: #2c3e50; align-self: flex-start; }
        .footer { padding: 15px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { border: none; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; }
        .btn-mic { background: #e74c3c; color: white; margin: 0 auto; width: 50px; height: 50px; font-size: 20px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header"><strong>AI Sponsor</strong></div>
    <div id="chat"></div>
    <div class="footer">
        <button id="micBtn" class="btn-mic" onclick="toggleRecording()">🎤</button>
        <div class="row">
            <input type="text" id="textInput" placeholder="Écrire..." onkeypress="if(event.key==='Enter') sendText()">
            <button style="background: #27ae60; color: white;" onclick="sendText()">➤</button>
        </div>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    // Sur Render, l'API est sur le même domaine, on laisse vide
    const API_URL = ""; 

    async function toggleRecording() {
        const btn = document.getElementById('micBtn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = sendVoice;
                mediaRecorder.start();
                btn.innerText = "⏹";
            } catch (err) { alert("Microphone non autorisé"); }
        } else {
            mediaRecorder.stop();
            btn.innerText = "🎤";
        }
    }

    async function sendVoice() {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const formData = new FormData();
        formData.append('file', blob);
        const res = await fetch(`${API_URL}/voice-chat`, { method: 'POST', body: formData });
        const data = await res.json();
        addMsg("Moi : " + (data.transcript || "Audio"), 'user');
        addMsg(data.response, 'ai');
        if (data.audio_url) new Audio(API_URL + data.audio_url).play();
    }

    async function sendText() {
        const input = document.getElementById('textInput');
        const msg = input.value;
        if (!msg) return;
        addMsg(msg, 'user');
        input.value = '';
        const res = await fetch(`${API_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        addMsg(data.response, 'ai');
    }

    function addMsg(txt, role) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = txt;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }
</script>
</body>
</html>
