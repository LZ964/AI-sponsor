<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sponsor - 12 Steps</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f7f9fc; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-container { width: 100%; max-width: 500px; height: 90vh; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 15px 15px 0 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; max-width: 85%; }
        .user { background: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .sponsor { background: #ecf0f1; color: #2c3e50; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-box { border-top: 1px solid #eee; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 25px; padding: 12px 20px; outline: none; }
        button { background: #27ae60; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h2 style="margin:0; font-size: 1.2rem;">AI Sponsor</h2>
            <small>12 Steps Program Support</small>
        </div>
        <div id="chat-window"></div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Partagez ce que vous vivez..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        
        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addBubble(text, 'user');
            input.value = '';

            try {
                const res = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                addBubble(data.response, 'sponsor');
            } catch (e) {
                addBubble("Erreur: Impossible de joindre votre parrain IA.", 'sponsor');
            }
        }

        function addBubble(text, role) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
