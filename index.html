<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Sponsor | Interface Avancée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%); color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .neon-border { position: relative; background: #16213e; border-radius: 15px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .ai-message { background: rgba(0, 102, 255, 0.1); border-left: 3px solid #00f2ff; border-radius: 0 12px 12px 0; backdrop-filter: blur(10px); }
        .user-message { background: rgba(255, 255, 255, 0.05); border-right: 3px solid #7000ff; border-radius: 12px 0 0 12px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 text-center border-b border-gray-800">
        <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
            AI-SPONSOR PRO
        </h1>
        <p class="text-gray-500 text-sm mt-2 font-mono uppercase tracking-tighter">Système de Soutien Virtuel</p>
    </header>

    <main class="flex-grow container mx-auto max-w-3xl p-4 flex flex-col overflow-hidden">
        <div id="chat-window" class="flex-grow overflow-y-auto mb-4 space-y-4 p-4 neon-border">
            <div class="ai-message p-4 max-w-[85%]">
                <p class="text-cyan-400 font-mono text-xs mb-1">SYSTEM_INIT:</p>
                Bonjour Carl. Je suis là. Comment te sens-tu en ce moment ?
            </div>
        </div>

        <div class="relative group">
            <div class="flex gap-2 p-2 bg-black/40 rounded-full border border-gray-700 focus-within:border-cyan-500 transition-all">
                <input type="text" id="user-input" class="flex-grow bg-transparent border-none focus:ring-0 text-white px-4" placeholder="Tape ton message ici...">
                <button onclick="sendMessage()" class="bg-cyan-600 hover:bg-cyan-400 text-black font-bold p-3 rounded-full transition-all">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyBPd7ORtzCO2662BFBAntDR2gnYJSW54yQ"; 

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value.trim()) return;

            const userText = input.value;
            input.value = '';

            chatWindow.innerHTML += `<div class="user-message p-4 ml-auto max-w-[85%] text-right">
                <p class="text-purple-400 font-mono text-xs mb-1">USER_INPUT:</p>
                ${userText}
            </div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // Utilisation de l'URL v1beta avec le modèle flash qui est le plus robuste
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Réponds en tant que parrain virtuel de rétablissement empathique à : " + userText }] }]
                    })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : `Erreur ${response.status}`);
                }

                const aiText = data.candidates[0].content.parts[0].text;

                chatWindow.innerHTML += `<div class="ai-message p-4 max-w-[85%]">
                    <p class="text-cyan-400 font-mono text-xs mb-1">AI_RESPONSE:</p>
                    ${aiText}
                </div>`;
            } catch (error) {
                console.error("Erreur:", error);
                chatWindow.innerHTML += `<div class="p-2 text-red-500 text-xs font-mono text-center">
                    DIAGNOSTIC_ERROR: ${error.message}
                </div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
